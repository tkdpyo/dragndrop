<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Drag Drop Board</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <button id="addItemBtn">+ 요소 추가</button>
      <button id="saveBtn">저장</button>
      <button id="exportBtn">JSON 내보내기</button>
      <label for="importInput">JSON 불러오기</label>
      <input id="importInput" class="hidden" type="file" accept="application/json" />
      <button id="resetBtn">전체 초기화</button>
      <div class="spacer"></div>
      <div class="hint">드래그로 이동 · 더블클릭/바로 수정 가능 · 저장은 localStorage</div>
    </div>

    <div class="board-wrap">
      <div id="board" class="board">
        <div id="emptyState" class="empty-state">요소를 추가해서 자유롭게 배치해보세요.</div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
